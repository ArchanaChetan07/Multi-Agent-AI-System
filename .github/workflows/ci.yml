name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Pytest + batch eval (DEMO_MODE)
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "1"
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Batch outcome metrics
        run: python scripts/batch_eval.py

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: batch-metrics
          path: artifacts/batch_metrics.json
